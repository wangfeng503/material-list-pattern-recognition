# 病害材料预测系统配置文件
# 由 4verify_linear_static.py 自动生成，也可手动编辑
#
# 变换类型说明:
#   linear: 用量 = ratio × size        (线性)
#   sqrt:   用量 = ratio × √size       (二次根)
#   cbrt:   用量 = ratio × ∛size       (三次根)
#   square: 用量 = ratio × size²       (二次方)
#   cube:   用量 = ratio × size³       (三次方)
#
# 变换选择策略：CV最小 + CV质量门槛(CV<0.5才用非线性，否则回退linear)
# transformations 中未列出的(病害,材料)对将使用 default_transform

